services:
  - type: web
    name: edumanage-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
